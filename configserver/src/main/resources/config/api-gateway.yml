server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service    # Changed from lb:// to direct HTTP IP
          predicates:
            - Path=/api/users/**

        - id: activity-service
          uri: lb://activity-service         # Assuming you still want Eureka for these
          predicates:
            - Path=/api/activities/**

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/recommendations/**