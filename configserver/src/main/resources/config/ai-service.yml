server:
  port: 8083
spring:

  data:
  mongodb:
    uri: mongodb://localhost:27017/fitnessrecommendation
    database: fitnessrecommendation
  rabbitmq:
    # Use the full URL provided by CloudAMQP
    rabbitmq:
      host: localhost
      port: 5672
      username: guest
      password: guest
    
eureka:
  client:
    serviceUrl:
   
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking
gemini:
  api:
    url: ${GEMINI_API_URL}
    key: ${GEMINI_API_KEY}


