spring:
  application:
    name: activity-service
  mongodb:
    database: fitnessactivity
    uri: mongodb://localhost:27017/fitnessactivity


server:
  port:  8082


eureka:
  client:
     serviceUrl:
       defaultZone : http://localhost:8761/eureka/


rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

